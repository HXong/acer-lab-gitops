apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: minecraft
  namespace: argocd
  labels:
    app.kubernetes.io/name: minecraft
    app.kubernetes.io/part-of: acer-lab
spec:
  project: default

  source:
    repoURL: https://github.com/hxong/acer-lab-gitops.git
    targetRevision: main
    path: apps/minecraft

  destination:
    server: https://kubernetes.default.svc
    namespace: minecraft

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
