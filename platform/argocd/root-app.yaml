apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: acer-lab-root
  namespace: argocd
  labels:
    app.kubernetes.io/name: acer-lab-root
    app.kubernetes.io/part-of: acer-lab
spec:
  project: default

  source:
    repoURL: https://github.com/hxong/acer-lab-gitops.git
    targetRevision: main
    path: platform/argocd/apps

  destination:
    server: https://kubernetes.default.svc
    namespace: argocd

  syncPolicy:
    automated:
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
