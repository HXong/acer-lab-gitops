apiVersion: v1
kind: Service
metadata:
  name: homelab-dashboard
  namespace: homelab-dashboard
  labels:
    app: homelab-dashboard
    app.kubernetes.io/name: homelab-dashboard
    app.kubernetes.io/part-of: acer-lab
spec:
  type: NodePort
  selector:
    app: homelab-dashboard
  ports:
    - name: http
      port: 80
      targetPort: http
      nodePort: 30093
