apiVersion: v1
kind: Service
metadata:
  name: app-name
  namespace: app-namespace
  labels:
    app: app-name
    app.kubernetes.io/name: app-name
    app.kubernetes.io/part-of: acer-lab
spec:
  type: NodePort
  selector:
    app: app-name
  ports:
    - name: http
      port: 80
      targetPort: 80
      nodePort: 30090
