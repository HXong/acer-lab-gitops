apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-test
  namespace: homelab-test
  labels:
    app: nginx-test
    app.kubernetes.io/name: sample-app
    app.kubernetes.io/part-of: acer-lab
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: nginx-test
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: nginx-test
        app.kubernetes.io/name: sample-app
        app.kubernetes.io/part-of: acer-lab
    spec:
      imagePullSecrets:
        - name: ghcr-creds
      containers:
        - name: sample-app
          image: ghcr.io/hxong/acer-lab-sample-app:latest
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 128Mi
